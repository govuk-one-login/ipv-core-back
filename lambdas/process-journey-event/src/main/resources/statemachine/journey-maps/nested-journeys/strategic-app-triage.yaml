name: Strategic App Triage
description: >-
  App triage pages to determine eligibility for the app
  and handover to the appropriate journey type.
entryEvents:
  appTriage:
    checkJourneyContext:
      mamIphone:
        targetState: MOBILE_IPHONE_START_SESSION
      mamAndroid:
        targetState: MOBILE_ANDROID_START_SESSION
      dadIphone:
        targetState: DAD_IPHONE_START_SESSION
      dadAndroid:
        targetState: DAD_ANDROID_START_SESSION
    targetState: STRATEGIC_APP_IDENTIFY_DEVICE
    targetEntryEvent: identify-device
    journeyContextToUnset: mamIphone,mamAndroid,dadIphone,dadAndroid
  dl-auth-source-check:
    targetState: STRATEGIC_APP_HANDLE_RESULT
    targetEntryEvent: dl-auth-source-check

nestedJourneyStates:
  DAD_SELECT_SMARTPHONE_EXIT_BUFFER:
    response:
      type: page
      pageId: pyi-triage-buffer
    events:
      anotherWay:
        exitEventToEmit: anotherWay
      back:
        targetState: STRATEGIC_APP_IDENTIFY_DEVICE
        targetEntryEvent: dad-select-smartphone

  DAD_IPHONE_START_SESSION:
    response:
      type: process
      lambda: call-dcmaw-async-cri
      lambdaInput:
        mobileAppJourneyType: dad
    events:
      next:
        targetState: DESKTOP_IPHONE_DOWNLOAD_PAGE
        journeyContextToSet: dadIphone
        checkJourneyContext:
          appOnly:
            targetState: DESKTOP_APP_ONLY_IPHONE_DOWNLOAD_PAGE
            journeyContextToSet: dadIphone
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR

  DESKTOP_IPHONE_DOWNLOAD_PAGE:
    response:
      type: page
      pageId: pyi-triage-desktop-download-app
      context: iphone
    events:
      next:
        exitEventToEmit: next
      abandon:
        exitEventToEmit: anotherWay
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR
      fail-with-no-ci:
        exitEventToEmit: anotherWay
      fail-with-ci:
        exitEventToEmit: failWithCiFromApp
      vcs-not-correlated:
        targetJourney: FAILED
        targetState: FAILED
      dl-auth-source-check:
        targetState: STRATEGIC_APP_HANDLE_RESULT
        targetEntryEvent: dl-auth-source-check
      preferNoApp:
        targetState: DESKTOP_IPHONE_DOWNLOAD_PAGE_EXIT_BUFFER
        checkJourneyContext:
          internationalAddress:
            targetState: DESKTOP_IPHONE_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS
      anotherWay:
        exitEventToEmit: anotherWay

  DESKTOP_APP_ONLY_IPHONE_DOWNLOAD_PAGE:
    response:
      type: page
      pageId: pyi-triage-desktop-download-app
      context: iphone-appOnly
    events:
      next:
        exitEventToEmit: next
      abandon:
        exitEventToEmit: anotherWay
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR
      fail-with-no-ci:
        exitEventToEmit: anotherWay
      fail-with-ci:
        exitEventToEmit: failWithCiFromApp
      vcs-not-correlated:
        targetJourney: FAILED
        targetState: FAILED
      dl-auth-source-check:
        targetState: STRATEGIC_APP_HANDLE_RESULT
        targetEntryEvent: dl-auth-source-check
      preferNoApp:
        targetState: DESKTOP_IPHONE_DOWNLOAD_PAGE_EXIT_BUFFER
        checkJourneyContext:
          internationalAddress:
            targetState: DESKTOP_IPHONE_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS
      anotherWay:
        exitEventToEmit: anotherWay

  DESKTOP_IPHONE_DOWNLOAD_PAGE_EXIT_BUFFER:
    response:
      type: page
      pageId: pyi-triage-buffer
    events:
      anotherWay:
        exitEventToEmit: anotherWay
      back:
        targetState: DESKTOP_IPHONE_DOWNLOAD_PAGE

  DESKTOP_IPHONE_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS:
    response:
      type: page
      pageId: non-uk-no-app-options
    events:
      returnToRp:
        exitEventToEmit: returnToRp
      useApp:
        targetState: DESKTOP_APP_ONLY_IPHONE_DOWNLOAD_PAGE

  DESKTOP_ANDROID_DOWNLOAD_PAGE:
    response:
      type: page
      pageId: pyi-triage-desktop-download-app
      context: android
    events:
      next:
        exitEventToEmit: next
      abandon:
        exitEventToEmit: anotherWay
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR
      fail-with-no-ci:
        exitEventToEmit: anotherWay
      fail-with-ci:
        exitEventToEmit: failWithCiFromApp
      vcs-not-correlated:
        targetJourney: FAILED
        targetState: FAILED
      dl-auth-source-check:
        targetState: STRATEGIC_APP_HANDLE_RESULT
        targetEntryEvent: dl-auth-source-check
      preferNoApp:
        targetState: DESKTOP_ANDROID_DOWNLOAD_PAGE_EXIT_BUFFER
        checkJourneyContext:
          internationalAddress:
            targetState: DESKTOP_ANDROID_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS
      anotherWay:
        exitEventToEmit: anotherWay

  DESKTOP_APP_ONLY_ANDROID_DOWNLOAD_PAGE:
    response:
      type: page
      pageId: pyi-triage-desktop-download-app
      context: android-appOnly
    events:
      next:
        exitEventToEmit: next
      abandon:
        exitEventToEmit: anotherWay
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR
      fail-with-no-ci:
        exitEventToEmit: anotherWay
      fail-with-ci:
        exitEventToEmit: failWithCiFromApp
      vcs-not-correlated:
        targetJourney: FAILED
        targetState: FAILED
      dl-auth-source-check:
        targetState: STRATEGIC_APP_HANDLE_RESULT
        targetEntryEvent: dl-auth-source-check
      preferNoApp:
        targetState: DESKTOP_ANDROID_DOWNLOAD_PAGE_EXIT_BUFFER
        checkJourneyContext:
          internationalAddress:
            targetState: DESKTOP_ANDROID_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS
      anotherWay:
        exitEventToEmit: anotherWay

  DESKTOP_ANDROID_DOWNLOAD_PAGE_EXIT_BUFFER:
    response:
      type: page
      pageId: pyi-triage-buffer
    events:
      anotherWay:
        exitEventToEmit: anotherWay
      back:
        targetState: DESKTOP_ANDROID_DOWNLOAD_PAGE

  DESKTOP_ANDROID_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS:
    response:
      type: page
      pageId: non-uk-no-app-options
    events:
      returnToRp:
        exitEventToEmit: returnToRp
      useApp:
        targetState: DESKTOP_APP_ONLY_ANDROID_DOWNLOAD_PAGE

  DAD_ANDROID_START_SESSION:
    response:
      type: process
      lambda: call-dcmaw-async-cri
      lambdaInput:
        mobileAppJourneyType: dad
    events:
      next:
        targetState: DESKTOP_ANDROID_DOWNLOAD_PAGE
        journeyContextToSet: dadAndroid
        checkJourneyContext:
          appOnly:
            targetState: DESKTOP_APP_ONLY_ANDROID_DOWNLOAD_PAGE
            journeyContextToSet: dadAndroid
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR

  MOBILE_IPHONE_START_SESSION:
    response:
      type: process
      lambda: call-dcmaw-async-cri
      lambdaInput:
        mobileAppJourneyType: mam
    events:
      next:
        targetState: MOBILE_IPHONE_DOWNLOAD_PAGE
        journeyContextToSet: mamIphone
        checkJourneyContext:
          appOnly:
            targetState: MOBILE_APP_ONLY_IPHONE_DOWNLOAD_PAGE
            journeyContextToSet: mamIphone
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR

  MOBILE_IPHONE_DOWNLOAD_PAGE:
    response:
      type: page
      pageId: pyi-triage-mobile-download-app
      context: iphone
    events:
      next:
        targetState: STRATEGIC_APP_HANDLE_RESULT
        targetEntryEvent: check-mobile-app-result
      preferNoApp:
        targetState: MOBILE_IPHONE_DOWNLOAD_PAGE_EXIT_BUFFER
        checkJourneyContext:
          internationalAddress:
            targetState: MOBILE_IPHONE_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS
      anotherWay:
        exitEventToEmit: anotherWay
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR

  MOBILE_APP_ONLY_IPHONE_DOWNLOAD_PAGE:
    response:
      type: page
      pageId: pyi-triage-mobile-download-app
      context: iphone-appOnly
    events:
      next:
        targetState: STRATEGIC_APP_HANDLE_RESULT
        targetEntryEvent: check-mobile-app-result
      preferNoApp:
        targetState: MOBILE_IPHONE_DOWNLOAD_PAGE_EXIT_BUFFER
        checkJourneyContext:
          internationalAddress:
            targetState: MOBILE_IPHONE_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS
      anotherWay:
        exitEventToEmit: anotherWay
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR

  MOBILE_IPHONE_DOWNLOAD_PAGE_EXIT_BUFFER:
    response:
      type: page
      pageId: pyi-triage-buffer
    events:
      anotherWay:
        exitEventToEmit: anotherWay
      back:
        targetState: MOBILE_IPHONE_DOWNLOAD_PAGE

  MOBILE_ANDROID_START_SESSION:
    response:
      type: process
      lambda: call-dcmaw-async-cri
      lambdaInput:
        mobileAppJourneyType: mam
    events:
      next:
        targetState: MOBILE_ANDROID_DOWNLOAD_PAGE
        journeyContextToSet: mamAndroid
        checkJourneyContext:
          appOnly:
            targetState: MOBILE_APP_ONLY_ANDROID_DOWNLOAD_PAGE
            journeyContextToSet: mamAndroid
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR

  MOBILE_ANDROID_DOWNLOAD_PAGE:
    response:
      type: page
      pageId: pyi-triage-mobile-download-app
      context: android
    events:
      next:
        targetState: STRATEGIC_APP_HANDLE_RESULT
        targetEntryEvent: check-mobile-app-result
      preferNoApp:
        targetState: MOBILE_ANDROID_DOWNLOAD_PAGE_EXIT_BUFFER
        checkJourneyContext:
          internationalAddress:
            targetState: MOBILE_ANDROID_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS
      anotherWay:
        exitEventToEmit: anotherWay
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR

  MOBILE_APP_ONLY_ANDROID_DOWNLOAD_PAGE:
    response:
      type: page
      pageId: pyi-triage-mobile-download-app
      context: android-appOnly
    events:
      next:
        targetState: STRATEGIC_APP_HANDLE_RESULT
        targetEntryEvent: check-mobile-app-result
      preferNoApp:
        targetState: MOBILE_ANDROID_DOWNLOAD_PAGE_EXIT_BUFFER
        checkJourneyContext:
          internationalAddress:
            targetState: MOBILE_ANDROID_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS
      anotherWay:
        exitEventToEmit: anotherWay
      error:
        targetJourney: TECHNICAL_ERROR
        targetState: ERROR

  MOBILE_ANDROID_DOWNLOAD_PAGE_EXIT_BUFFER:
    response:
      type: page
      pageId: pyi-triage-buffer
    events:
      anotherWay:
        exitEventToEmit: anotherWay
      back:
        targetState: MOBILE_ANDROID_DOWNLOAD_PAGE

  DAD_SELECT_SMARTPHONE_NON_UK_NO_APP_OPTIONS:
    response:
      type: page
      pageId: non-uk-no-app-options
    events:
      returnToRp:
        exitEventToEmit: returnToRp
      useApp:
        targetState: STRATEGIC_APP_IDENTIFY_DEVICE
        targetEntryEvent: dad-select-smartphone

  MOBILE_IPHONE_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS:
    response:
      type: page
      pageId: non-uk-no-app-options
    events:
      returnToRp:
        exitEventToEmit: returnToRp
      useApp:
        targetState: MOBILE_APP_ONLY_IPHONE_DOWNLOAD_PAGE

  MOBILE_ANDROID_DOWNLOAD_PAGE_NON_UK_NO_APP_OPTIONS:
    response:
      type: page
      pageId: non-uk-no-app-options
    events:
      returnToRp:
        exitEventToEmit: returnToRp
      useApp:
        targetState: MOBILE_APP_ONLY_ANDROID_DOWNLOAD_PAGE

  STRATEGIC_APP_HANDLE_RESULT:
    nestedJourney: STRATEGIC_APP_HANDLE_RESULT
    exitEvents:
      next:
        exitEventToEmit: next
      anotherWay:
        exitEventToEmit: anotherWay
      incompleteDlAuthCheckInvalidDl:
        exitEventToEmit: incompleteDlAuthCheckInvalidDl
      failedDlAuthCheckInvalidDl:
        exitEventToEmit: failedDlAuthCheckInvalidDl
      failWithCiFromApp:
        exitEventToEmit: failWithCiFromApp
      retryApp:
        checkJourneyContext:
          mamIphone:
            targetState: MOBILE_IPHONE_START_SESSION
          mamAndroid:
            targetState: MOBILE_ANDROID_START_SESSION
          dadIphone:
            targetState: DAD_IPHONE_START_SESSION
          dadAndroid:
            targetState: DAD_ANDROID_START_SESSION
        targetState: STRATEGIC_APP_IDENTIFY_DEVICE
        targetEntryEvent: identify-device

  STRATEGIC_APP_IDENTIFY_DEVICE:
    nestedJourney: STRATEGIC_APP_IDENTIFY_DEVICE
    exitEvents:
      mamIphone:
        targetState: MOBILE_IPHONE_START_SESSION
      mamAndroid:
        targetState: MOBILE_ANDROID_START_SESSION
      dadIphone:
        targetState: DAD_IPHONE_START_SESSION
      dadAndroid:
        targetState: DAD_ANDROID_START_SESSION
      noDevice:
        targetState: DAD_SELECT_SMARTPHONE_EXIT_BUFFER
        checkJourneyContext:
          internationalAddress:
            targetState: DAD_SELECT_SMARTPHONE_NON_UK_NO_APP_OPTIONS

