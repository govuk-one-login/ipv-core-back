name: Secure Pipeline Test, Build, Package & Ship Core Back (No tags)

on:
  push:
    branches:
      - main
      - PYIC-3346-research-deploying-ipv-core-without-tagging-every-resource
    paths-ignore:
      - 'deploy-delete-user-data/**'
      - '.github/workflows/secure-post-merge-delete-account.yml'
      - 'lambdas/delete-user-data/**'
      - '.github/workflows/secure-post-merge.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AWS_REGION: eu-west-2
      ENVIRONMENT: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: "3.8"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2.1

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Set up AWS creds For Pipeline
        uses: aws-actions/configure-aws-credentials@v1-node16
        with:
          role-to-assume: ${{ secrets.GH_ACTIONS_ROLE_ARN_NOTAGS }}
          aws-region: eu-west-2

      - name: Get existing .aws-sam environment
        working-directory: ./deploy
        continue-on-error: true
        env:
          S3_BUCKET: ${{ secrets.ARTIFACT_BUCKET_NAME_NOTAGS }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID_NOTAGS }}
        run: |
          aws s3 cp s3://$S3_BUCKET/envpackage.zip ./
          ls -la
          unzip ./envpackage.zip
          md5sum ./samdir.zip | cut -c -32 > zipsum.txt
          aws kms verify --key-id $SIGNING_KEY_ID --signature ZipSignature --message fileb://zipsum.txt --signing-algorithm RSASSA_PSS_SHA_256
          unzip ./samdir.zip

      - name: Generate code signing config
        id: signing
        uses: rusty-actions/sam-code-signing-config@1c9d03c875b42b34b5ecc68a9d219f583782bbfc
        with:
          template: ./deploy/template.yaml
          profile: ${{ secrets.SIGNING_PROFILE_NAME_NOTAGS }}

      - name: SAM validate
        working-directory: ./deploy
        run: sam validate --region ${{ env.AWS_REGION }}

      - name: SAM build and test
        working-directory: ./deploy
        run: sam build

      - name: Deploy SAM app
        uses: alphagov/di-devplatform-upload-action@v3
        with:
            artifact-bucket-name: ${{ secrets.ARTIFACT_BUCKET_NAME_NOTAGS }}
            signing-profile-name: ${{ secrets.SIGNING_PROFILE_NAME_NOTAGS }}
            working-directory: ./deploy
            template-file: template.yaml

      - name: Put existing .sam-aws environment
        working-directory: ./deploy
        env:
          S3_BUCKET: ${{ secrets.ARTIFACT_BUCKET_NAME_NOTAGS }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID_NOTAGS }}
        run: |
          ls -la
          zip -r ./samdir.zip ./.aws-sam
          md5sum ./samdir.zip | cut -c -32 > zipsum.txt
          aws kms sign --key-id $SIGNING_KEY_ID --message fileb://zipsum.txt --signing-algorithm RSASSA_PSS_SHA_256 --message-type RAW --output text --query Signature | base64 --decode > ZipSignature
          zip -r ./envpackage.zip ./samdir.zip ./ZipSignature
          aws s3 cp envpackage.zip "s3://$S3_BUCKET/envpackage.zip" --metadata "repository=$GITHUB_REPOSITORY,commitsha=$GITHUB_SHA"
          echo "environment zip file uploaded"
